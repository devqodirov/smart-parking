services:
  - type: web
    name: smart-parking
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-parking-db
          property: connectionString

databases:
  - name: smart-parking-db
    databaseName: smart_parking
    plan: free
